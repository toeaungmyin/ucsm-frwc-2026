# Production: nginx, frontend, backend, minio. Postgres (or any DB) is external — use DATABASE_URL in backend/.env.
# Nginx on host 8026 (matches backend/server-nginx.conf proxy to 127.0.0.1:8026).
#
#   cp backend/.env.production backend/.env
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  nginx:
    image: nginx:alpine
    container_name: ucsm-frwc-nginx
    restart: unless-stopped
    ports:
      - "8026:80"
    volumes:
      - ./docker/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ucsm-network
    depends_on:
      - frontend
      - backend
      - minio

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ucsm-frwc-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    expose:
      - "8000"
    networks:
      - ucsm-network
    depends_on:
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ucsm-frwc-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - ucsm-network

  minio:
    image: minio/minio:latest
    container_name: ucsm-frwc-minio
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - minio_data:/data
    expose:
      - "9000"
    ports:
      - "127.0.0.1:9001:9001"
    networks:
      - ucsm-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ucsm-network:
    driver: bridge

volumes:
  minio_data:
